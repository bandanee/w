<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>OmniSensor - Dijital Lamba İkizi</title>
    <style>
        body {
            background: #0d1117;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Lamba Görseli */
        .lightbulb {
            position: relative;
            width: 150px;
            height: 150px;
            background: #333;
            border-radius: 50%;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #444;
        }

        /* Lamba AÇIK Durumu */
        .lightbulb.on {
            background: #ffdb58;
            box-shadow: 0 0 80px #ffdb58, inset 0 0 20px white;
            border-color: #ffea00;
        }

        .status-card {
            background: #161b22;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 30px;
            border: 1px solid #30363d;
            min-width: 250px;
        }

        button {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button:hover { background: #2ea043; }
        
        .data-stream {
            font-family: monospace;
            color: #7dd3fc;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <button id="connectBtn">🔌 CİHAZA BAĞLAN (USB)</button>

    <div id="bulb" class="lightbulb"></div>

    <div class="status-card">
        <h3>DURUM: <span id="statText" style="color: #8b949e;">ÇEVRİMDIŞI</span></h3>
        <div class="data-stream" id="stream">Veri bekleniyor...</div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const bulb = document.getElementById('bulb');
        const statText = document.getElementById('statText');
        const stream = document.getElementById('stream');

        connectBtn.addEventListener('click', async () => {
            try {
                // 1. Seri Portu İste
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                connectBtn.style.display = 'none';
                statText.innerText = "BAĞLI";
                statText.style.color = "#3fb950";

                // 2. Veri Okuma Döngüsü
                const decoder = new TextDecoderStream();
                const inputReader = port.readable.pipeThrough(decoder).getReader();

                while (true) {
                    const { value, done } = await inputReader.read();
                    if (done) break;

                    if (value) {
                        stream.innerText = "Gelen: " + value;
                        
                        // JSON Ayıklama
                        try {
                            const data = JSON.parse(value.trim());
                            if (data.led === 1) {
                                bulb.classList.add('on');
                            } else {
                                bulb.classList.remove('on');
                            }
                        } catch (e) {
                            // Tamamlanmamış JSON paketlerini yoksay
                        }
                    }
                }
            } catch (error) {
                console.error("Bağlantı hatası:", error);
                alert("Seri porta bağlanılamadı. Lütfen Chrome kullanın.");
            }
        });
    </script>
</body>
</html>
